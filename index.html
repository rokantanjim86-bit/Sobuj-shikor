<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সবুজ শিখর | Ultimate Eco-Social</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main-bg: #f3f7f6; --card-bg: #ffffff; --text-color: #1f2937; }
        .dark-mode { --main-bg: #111827; --card-bg: #1f2937; --text-color: #f9fafb; }
        body { font-family: 'Hind Siliguri', sans-serif; background: var(--main-bg); color: var(--text-color); transition: 0.3s; }
        .tab-content { display: none; }
        .active-tab { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nav-glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .dark-mode .nav-glass { background: rgba(31, 41, 55, 0.8); }
    </style>
</head>
<body class="pb-24">

    <section id="auth-screen" class="fixed inset-0 z-[200] bg-green-50 flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl text-center max-w-sm w-full space-y-6">
            <h1 class="text-3xl font-black text-green-700">🌱 সবুজ শিখর</h1>
            <p class="text-gray-500">পরিবেশ রক্ষায় আপনার যাত্রা শুরু হোক এখান থেকে</p>
            <button id="btn-google" class="w-full flex items-center justify-center gap-3 bg-white border-2 border-gray-100 py-4 rounded-2xl font-bold hover:bg-gray-50 transition">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20"> Google দিয়ে লগইন
            </button>
        </div>
    </section>

    <div id="app-content" class="hidden">
        <header class="sticky top-0 z-50 nav-glass p-4 flex justify-between items-center border-b">
            <h2 class="font-bold text-green-600 text-xl">সবুজ শিখর</h2>
            <div class="flex items-center gap-3">
                <button onclick="toggleDark()" class="text-xl">🌓</button>
                <div class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold"><span id="u-xp">0</span> XP</div>
                <img id="u-img" class="w-10 h-10 rounded-full border-2 border-green-500 cursor-pointer" onclick="switchTab('profile')">
            </div>
        </header>

        <main class="max-w-md mx-auto p-4 space-y-5">
            <div id="tab-home" class="tab-content active-tab space-y-4">
                <div class="bg-[var(--card-bg)] p-5 rounded-3xl shadow-sm border border-white/50 space-y-4">
                    <textarea id="p-desc" class="w-full h-24 p-3 bg-gray-50 rounded-2xl outline-none text-black" placeholder="পরিবেশ রক্ষায় আজ কী করলেন? (২০+ শব্দ বাধ্যতামূলক)"></textarea>
                    <div class="flex items-center justify-between">
                        <label class="cursor-pointer text-green-600 font-bold text-sm flex items-center gap-2">
                            <i class="fa-solid fa-camera"></i> ছবি দিন
                            <input type="file" id="p-file" class="hidden" accept="image/*">
                        </label>
                        <button id="btn-post" class="bg-green-600 text-white px-8 py-2 rounded-xl font-bold shadow-lg">শেয়ার</button>
                    </div>
                </div>
                <div id="feed" class="space-y-4"></div>
            </div>

            <div id="tab-map" class="tab-content">
                <div class="bg-[var(--card-bg)] p-2 rounded-3xl border h-96 overflow-hidden">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3651.90234131!2d90.3901783!3d23.7508826!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3755b89795690433%3A0x33621430032f6a73!2sBangladesh!5e0!3m2!1sen!2sbd!4v1716123456789" class="w-full h-full border-none"></iframe>
                </div>
            </div>

            <div id="tab-rank" class="tab-content">
                <h3 class="text-center font-bold mb-4">সেরা সবুজ যোদ্ধা 🏆</h3>
                <div id="leaderboard" class="bg-[var(--card-bg)] rounded-3xl border divide-y overflow-hidden"></div>
            </div>

            <div id="tab-profile" class="tab-content space-y-4">
                <div class="bg-[var(--card-bg)] p-8 rounded-3xl border text-center space-y-4">
                    <img id="pr-img" class="w-24 h-24 rounded-full mx-auto border-4 border-green-500 shadow-xl">
                    <h2 id="pr-name" class="text-2xl font-bold">নাম</h2>
                    <p id="pr-bio" class="text-gray-500"></p>
                </div>
                <div class="bg-[var(--card-bg)] p-6 rounded-3xl border space-y-4">
                    <h4 class="font-bold border-b pb-2">প্রোফাইল এডিট</h4>
                    <input id="ed-name" type="text" placeholder="নতুন নাম" class="w-full p-3 bg-gray-50 text-black rounded-xl border">
                    <input id="ed-bio" type="text" placeholder="আপনার বায়ো (পেশা)" class="w-full p-3 bg-gray-50 text-black rounded-xl border">
                    <button id="btn-update" class="w-full bg-green-700 text-white py-3 rounded-xl font-bold shadow-md">সংরক্ষণ করুন</button>
                    <button onclick="logout()" class="w-full text-red-500 font-bold py-2">লগ আউট</button>
                </div>
            </div>
        </main>

        <button onclick="toggleAI()" class="fixed bottom-28 right-6 w-14 h-14 bg-green-600 text-white rounded-2xl shadow-2xl flex items-center justify-center text-2xl z-40 animate-bounce">🤖</button>
        <div id="ai-box" class="fixed inset-x-6 bottom-28 h-96 bg-white rounded-3xl shadow-2xl border z-50 hidden flex flex-col overflow-hidden">
            <div class="bg-green-600 p-4 text-white flex justify-between font-bold"><span>সবুজ বন্ধু AI</span><button onclick="toggleAI()">✕</button></div>
            <div id="ai-chat" class="flex-1 p-4 overflow-y-auto space-y-2 text-sm text-black"></div>
            <div class="p-3 border-t flex gap-2">
                <input id="ai-in" type="text" placeholder="গাছ লাগানো নিয়ে কিছু জিজ্ঞেস করুন..." class="flex-1 bg-gray-100 p-2 rounded-xl outline-none text-black">
                <button id="ai-send" class="bg-green-600 text-white px-4 rounded-xl"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>

        <nav class="fixed bottom-6 inset-x-6 h-20 bg-[var(--card-bg)] shadow-2xl rounded-[2.5rem] border flex justify-around items-center z-50">
            <button onclick="switchTab('home')" class="nav-btn text-green-600 flex flex-col items-center gap-1"><i class="fa-solid fa-home text-xl"></i><span class="text-[10px] font-bold">হোম</span></button>
            <button onclick="switchTab('map')" class="nav-btn text-gray-400 flex flex-col items-center gap-1"><i class="fa-solid fa-map-location text-xl"></i><span class="text-[10px] font-bold">ম্যাপ</span></button>
            <button onclick="switchTab('rank')" class="nav-btn text-gray-400 flex flex-col items-center gap-1"><i class="fa-solid fa-trophy text-xl"></i><span class="text-[10px] font-bold">র‍্যাঙ্ক</span></button>
            <button onclick="switchTab('profile')" class="nav-btn text-gray-400 flex flex-col items-center gap-1"><i class="fa-solid fa-user-gear text-xl"></i><span class="text-[10px] font-bold">প্রোফাইল</span></button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, addDoc, onSnapshot, query, orderBy, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // আপনার ফায়ারবেস কনফিগারেশন
        const firebaseConfig = {
            apiKey: "AIzaSyAPFw8UVunLn_ob9zuaY-0unZyiA0bED70",
            authDomain: "sobuj-shikhor-1.firebaseapp.com",
            projectId: "sobuj-shikhor-1",
            storageBucket: "sobuj-shikhor-1.appspot.com",
            messagingSenderId: "582453210412",
            appId: "1:582453210412:web:da5e0188977f8d82ab5089"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const GEMINI_KEY = "AIzaSyB6lRD9MW7p0cruCKW7w1179CblDhpanS4"; // স্ক্রিনশট থেকে নেওয়া

        // --- গুগল লগইন ---
        document.getElementById('btn-google').onclick = () => {
            signInWithPopup(auth, provider).then(async (res) => {
                const user = res.user;
                const userRef = doc(db, "users", user.uid);
                const snap = await getDoc(userRef);
                if (!snap.exists()) {
                    await setDoc(userRef, { name: user.displayName, bio: "আমি একজন সবুজ যোদ্ধা", xp: 110, photo: user.photoURL });
                }
            });
        };

        onAuthStateChanged(auth, user => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-content').classList.remove('hidden');
                loadUser(user.uid);
                loadFeed();
                loadRankings();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('app-content').classList.add('hidden');
            }
        });

        // --- প্রোফাইল ডাটা লোড ও আপডেট ---
        function loadUser(uid) {
            onSnapshot(doc(db, "users", uid), d => {
                const u = d.data();
                document.getElementById('u-xp').innerText = u.xp;
                document.getElementById('u-img').src = u.photo;
                document.getElementById('pr-img').src = u.photo;
                document.getElementById('pr-name').innerText = u.name;
                document.getElementById('pr-bio').innerText = u.bio;
            });
        }

        document.getElementById('btn-update').onclick = async () => {
            const name = document.getElementById('ed-name').value;
            const bio = document.getElementById('ed-bio').value;
            if(!name || !bio) return alert("দয়া করে নাম ও বায়ো দিন!");
            await updateDoc(doc(db, "users", auth.currentUser.uid), { name, bio });
            alert("প্রোফাইল আপডেট হয়েছে!");
        };

        // --- এআই চ্যাট (Gemini) ---
        window.toggleAI = () => document.getElementById('ai-box').classList.toggle('hidden');
        document.getElementById('ai-send').onclick = async () => {
            const inp = document.getElementById('ai-in').value;
            if(!inp) return;
            const chat = document.getElementById('ai-chat');
            chat.innerHTML += `<p class='text-right'><b>আপনি:</b> ${inp}</p>`;
            document.getElementById('ai-in').value = "";

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                    method: "POST",
                    body: JSON.stringify({ contents: [{ parts: [{ text: inp + ". উত্তর খুব সংক্ষেপে এবং বাংলায় দাও।" }] }] })
                });
                const data = await res.json();
                chat.innerHTML += `<p><b>বন্ধু:</b> ${data.candidates[0].content.parts[0].text}</p>`;
                chat.scrollTop = chat.scrollHeight;
            } catch (e) { alert("AI কানেকশন এরর!"); }
        };

        // --- ছবি শেয়ার ও লাইক-কমেন্ট ---
        document.getElementById('btn-post').onclick = async () => {
            const desc = document.getElementById('p-desc').value;
            const file = document.getElementById('p-file').files[0];
            if(desc.length < 20 || !file) return alert("বিস্তারিত বর্ণনা ও ছবি দিন!");

            const reader = new FileReader();
            reader.onload = async (e) => {
                await addDoc(collection(db, "posts"), {
                    uid: auth.currentUser.uid,
                    name: auth.currentUser.displayName,
                    photo: auth.currentUser.photoURL,
                    text: desc,
                    image: e.target.result,
                    likes: [],
                    time: new Date()
                });
                await updateDoc(doc(db, "users", auth.currentUser.uid), { xp: increment(50) });
                alert("পোস্ট সফল! ৫০ XP পেয়েছেন।");
                document.getElementById('p-desc').value = "";
            };
            reader.readAsDataURL(file);
        };

        function loadFeed() {
            onSnapshot(query(collection(db, "posts"), orderBy("time", "desc")), snap => {
                let html = "";
                snap.forEach(d => {
                    const p = d.data();
                    html += `
                    <div class="bg-[var(--card-bg)] p-4 rounded-3xl border space-y-3">
                        <div class="flex items-center gap-2"><img src="${p.photo}" class="w-8 h-8 rounded-full"><b>${p.name}</b></div>
                        <p class="text-sm">${p.text}</p>
                        <img src="${p.image}" class="w-full rounded-2xl h-48 object-cover">
                        <div class="flex gap-4 pt-2 border-t text-xs font-bold">
                            <button onclick="likePost('${d.id}')" class="text-red-500"><i class="fa-solid fa-heart"></i> ${p.likes.length}</button>
                            <button onclick="document.getElementById('c-${d.id}').classList.toggle('hidden')"><i class="fa-solid fa-comment"></i> কমেন্ট</button>
                        </div>
                        <div id="c-${d.id}" class="hidden pt-2 space-y-2">
                            <div id="list-${d.id}" class="text-[10px] space-y-1"></div>
                            <div class="flex gap-2"><input id="in-${d.id}" class="flex-1 bg-gray-50 border rounded-lg p-1 text-black outline-none"><button onclick="addCom('${d.id}')" class="bg-green-600 text-white px-2 rounded-lg">Send</button></div>
                        </div>
                    </div>`;
                    loadCom(d.id);
                });
                document.getElementById('feed').innerHTML = html;
            });
        }

        window.likePost = async (id) => {
            const ref = doc(db, "posts", id);
            const s = await getDoc(ref);
            let l = s.data().likes || [];
            if(l.includes(auth.currentUser.uid)) l = l.filter(i => i !== auth.currentUser.uid);
            else l.push(auth.currentUser.uid);
            await updateDoc(ref, { likes: l });
        };

        window.addCom = async (id) => {
            const i = document.getElementById(`in-${id}`);
            if(!i.value) return;
            await addDoc(collection(db, "posts", id, "comments"), { name: auth.currentUser.displayName, text: i.value, time: new Date() });
            i.value = "";
        };

        function loadCom(id) {
            onSnapshot(query(collection(db, "posts", id, "comments"), orderBy("time", "asc")), s => {
                let h = ""; s.forEach(cd => h += `<div><b>${cd.data().name}:</b> ${cd.data().text}</div>`);
                const el = document.getElementById(`list-${id}`); if(el) el.innerHTML = h;
            });
        }

        function loadRankings() {
            onSnapshot(query(collection(db, "users"), orderBy("xp", "desc")), snap => {
                let h = ""; snap.forEach(d => h += `<div class="p-3 flex justify-between"><span>${d.data().name}</span><b>${d.data().xp} XP</b></div>`);
                document.getElementById('leaderboard').innerHTML = h;
            });
        }

        // --- অন্যান্য ---
        window.switchTab = t => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active-tab'));
            document.getElementById('tab-' + t).classList.add('active-tab');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.replace('text-green-600', 'text-gray-400'));
            event.currentTarget.classList.replace('text-gray-400', 'text-green-600');
        };
        window.toggleDark = () => document.body.classList.toggle('dark-mode');
        window.logout = () => signOut(auth).then(() => location.reload());
    </script>
</body>
</html>
