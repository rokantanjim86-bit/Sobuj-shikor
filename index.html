<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সবুজ শিখর - প্রো এডিশন</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background: #f0f4f8; }
        .premium-card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .tab-content { display: none; }
        .active-tab { display: block; }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #059669; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-24">

    <section id="auth-screen" class="fixed inset-0 z-[200] bg-white flex items-center justify-center p-6 hidden">
        <div class="w-full max-w-md space-y-6 text-center">
            <h1 class="text-4xl font-black text-green-700">সবুজ শিখর</h1>
            <p class="text-gray-500">লগইন বা একাউন্ট তৈরি করুন</p>
            <input id="auth-email" type="email" placeholder="ইমেল" class="w-full p-4 bg-gray-100 rounded-2xl outline-none">
            <input id="auth-pass" type="password" placeholder="পাসওয়ার্ড" class="w-full p-4 bg-gray-100 rounded-2xl outline-none">
            <div class="flex gap-2">
                <button id="btn-login" class="flex-1 bg-green-600 text-white py-4 rounded-2xl font-bold">লগইন</button>
                <button id="btn-signup" class="flex-1 border-2 border-green-600 text-green-600 py-4 rounded-2xl font-bold">রেজিস্ট্রার</button>
            </div>
            <button id="btn-google" class="w-full py-4 border rounded-2xl flex items-center justify-center gap-2"><img src="https://www.svgrepo.com/show/355037/google.svg" class="w-5"> গুগল</button>
        </div>
    </section>

    <header id="main-header" class="sticky top-0 bg-white/90 backdrop-blur p-4 flex justify-between items-center z-50 border-b">
        <div class="flex items-center gap-2 font-bold text-green-700 text-xl">🌱 সবুজ শিখর</div>
        <div class="flex items-center gap-3">
            <div class="text-xs font-bold bg-green-100 text-green-700 px-3 py-1 rounded-full"><span id="user-xp">0</span> XP</div>
            <img id="header-img" src="" class="w-10 h-10 rounded-full border cursor-pointer" onclick="switchTab('profile')">
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">
        
        <div id="tab-home" class="tab-content active-tab space-y-4">
            <div class="premium-card p-5 space-y-4">
                <textarea id="post-desc" class="w-full h-24 p-3 bg-gray-50 rounded-xl outline-none text-sm" placeholder="আজকের ভালো কাজের বর্ণনা দিন (পয়েন্ট পেতে ছবি ও ২০+ শব্দ বাধ্যতামূলক)..."></textarea>
                <div class="flex items-center justify-between">
                    <label class="cursor-pointer text-green-600 text-sm font-bold flex items-center gap-1">
                        <i class="fa-solid fa-camera"></i> ছবি দিন
                        <input type="file" id="post-file" class="hidden" accept="image/*">
                    </label>
                    <button id="btn-share" class="bg-green-700 text-white px-6 py-2 rounded-xl font-bold text-sm">শেয়ার করুন</button>
                </div>
                <p id="limit-msg" class="text-red-500 text-[10px] hidden">আপনি আজ ৫টি পোস্ট করে ফেলেছেন। আগামীকাল আবার চেষ্টা করুন!</p>
            </div>
            <div id="feed" class="space-y-4"></div>
        </div>

        <div id="tab-profile" class="tab-content space-y-5">
            <div class="premium-card p-6 text-center space-y-3">
                <img id="prof-pic" src="" class="w-24 h-24 rounded-3xl mx-auto shadow-lg border-4 border-white">
                <h2 id="prof-name" class="text-xl font-bold">লোড হচ্ছে...</h2>
                <p id="prof-bio" class="text-gray-500 text-sm italic">"গাছ লাগান পরিবেশ বাঁচান"</p>
            </div>
            <div class="premium-card p-6 space-y-4">
                <h3 class="font-bold text-gray-700">প্রোফাইল সেটিংস</h3>
                <input id="edit-name" type="text" placeholder="নতুন নাম" class="w-full p-3 bg-gray-50 rounded-xl outline-none">
                <textarea id="edit-bio" placeholder="আপনার বায়ো" class="w-full p-3 bg-gray-50 rounded-xl outline-none h-20"></textarea>
                <button id="btn-update" class="w-full bg-green-700 text-white py-3 rounded-xl font-bold">সংরক্ষণ করুন</button>
                <button id="btn-logout" class="w-full text-red-500 font-bold mt-4">লগ আউট</button>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-6 inset-x-6 h-16 bg-white shadow-2xl rounded-2xl flex justify-around items-center border z-50">
        <button onclick="switchTab('home')" class="text-green-600"><i class="fa-solid fa-home text-xl"></i></button>
        <button onclick="switchTab('profile')" class="text-gray-400"><i class="fa-solid fa-user-gear text-xl"></i></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, addDoc, onSnapshot, query, orderBy, where, getDocs, increment, Timestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ফায়ারবেস কনফিগারেশন
        const firebaseConfig = {
            apiKey: "AIzaSyAPFw8UVunLn_ob9zuaY-0unZyiA0bED70",
            authDomain: "sobuj-shikhor-1.firebaseapp.com",
            projectId: "sobuj-shikhor-1",
            storageBucket: "sobuj-shikhor-1.appspot.com",
            messagingSenderId: "582453210412",
            appId: "1:582453210412:web:da5e0188977f8d82ab5089"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // ১. অথেনটিকেশন চেক
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                const userRef = doc(db, "users", user.uid);
                const snap = await getDoc(userRef);
                if (!snap.exists()) {
                    await setDoc(userRef, { name: user.displayName || "ইউজার", bio: "সবুজ যোদ্ধা", xp: 0, photo: user.photoURL || "https://via.placeholder.com/100" });
                }
                updateProfileUI(user.uid);
                loadFeed();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
            }
        });

        // ২. লগইন/রেজিস্ট্রেশন বাটন
        document.getElementById('btn-signup').onclick = () => {
            createUserWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-pass').value).catch(e => alert(e.message));
        };
        document.getElementById('btn-login').onclick = () => {
            signInWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-pass').value).catch(e => alert("ভুল ইমেল বা পাসওয়ার্ড!"));
        };
        document.getElementById('btn-google').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('btn-logout').onclick = () => signOut(auth).then(() => location.reload());

        // ৩. ৫টি পোস্ট লিমিট এবং জিপিএস ট্র্যাকিং
        document.getElementById('btn-share').onclick = async () => {
            const desc = document.getElementById('post-desc').value;
            const file = document.getElementById('post-file').files[0];
            const btn = document.getElementById('btn-share');

            if (desc.length < 20 || !file) return alert("পয়েন্ট পেতে ছবি এবং বিস্তারিত বর্ণনা দিন!");

            btn.disabled = true;
            btn.innerText = "যাচাই হচ্ছে...";

            // গত ২৪ ঘণ্টায় কয়টি পোস্ট হয়েছে চেক করা
            const oneDayAgo = new Date(Date.now() - 24 * 60 * 60 * 1000);
            const q = query(collection(db, "posts"), where("uid", "==", auth.currentUser.uid), where("time", ">", oneDayAgo));
            const querySnap = await getDocs(q);

            if (querySnap.size >= 5) {
                alert("আপনি ২৪ ঘণ্টায় সর্বোচ্চ ৫টি পোস্ট করতে পারবেন!");
                btn.disabled = false;
                btn.innerText = "শেয়ার করুন";
                return;
            }

            // জিপিএস লোকেশন সংগ্রহ
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude, longitude } = pos.coords;

                const reader = new FileReader();
                reader.onload = async (e) => {
                    await addDoc(collection(db, "posts"), {
                        uid: auth.currentUser.uid,
                        name: auth.currentUser.displayName || "ইউজার",
                        photo: auth.currentUser.photoURL,
                        text: desc,
                        image: e.target.result,
                        location: { lat: latitude, lng: longitude },
                        time: Timestamp.now()
                    });

                    await updateDoc(doc(db, "users", auth.currentUser.uid), { xp: increment(50) });
                    alert("সফল! আপনি ৫০ XP পেয়েছেন।");
                    location.reload();
                };
                reader.readAsDataURL(file);
            }, () => {
                alert("লোকেশন অন করুন!");
                btn.disabled = false;
            });
        };

        // প্রোফাইল আপডেট
        function updateProfileUI(uid) {
            onSnapshot(doc(db, "users", uid), (d) => {
                const data = d.data();
                document.getElementById('user-xp').innerText = data.xp;
                document.getElementById('header-img').src = data.photo;
                document.getElementById('prof-pic').src = data.photo;
                document.getElementById('prof-name').innerText = data.name;
                document.getElementById('prof-bio').innerText = data.bio;
            });
        }

        document.getElementById('btn-update').onclick = async () => {
            const up = {};
            if(document.getElementById('edit-name').value) up.name = document.getElementById('edit-name').value;
            if(document.getElementById('edit-bio').value) up.bio = document.getElementById('edit-bio').value;
            await updateDoc(doc(db, "users", auth.currentUser.uid), up);
            alert("আপডেট হয়েছে!");
        };

        window.switchTab = (t) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active-tab'));
            document.getElementById('tab-' + t).classList.add('active-tab');
        };

        function loadFeed() {
            onSnapshot(query(collection(db, "posts"), orderBy("time", "desc")), (snap) => {
                let h = "";
                snap.forEach(doc => {
                    const p = doc.data();
                    h += `
                        <div class="premium-card p-4 space-y-3">
                            <div class="flex items-center gap-2">
                                <img src="${p.photo}" class="w-8 h-8 rounded-full">
                                <b class="text-sm">${p.name}</b>
                                <span class="text-[9px] text-gray-400 italic">${p.location ? '📍 Tracked' : ''}</span>
                            </div>
                            <p class="text-sm text-gray-700">${p.text}</p>
                            <img src="${p.image}" class="w-full rounded-2xl h-48 object-cover shadow-inner">
                        </div>`;
                });
                document.getElementById('feed').innerHTML = h;
            });
        }
    </script>
</body>
</html>
