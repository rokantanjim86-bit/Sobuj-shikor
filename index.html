<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সবুজ শিখর | Secure Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --app-fs: 16px; }
        body { font-family: 'Hind Siliguri', sans-serif; background: #f0f4f3; font-size: var(--app-fs); transition: font-size 0.3s ease; }
        .tab-content { display: none; }
        .active-tab { display: block; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #059669; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .auth-card { background: white; border-radius: 2.5rem; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="pb-28">

    <section id="auth-screen" class="fixed inset-0 z-[200] bg-green-50 flex items-center justify-center p-6">
        <div class="auth-card max-w-md w-full p-8 text-center space-y-6">
            <div class="space-y-2">
                <span class="text-5xl">🌲</span>
                <h1 class="text-3xl font-black text-green-800">সবুজ শিখর</h1>
                <p class="text-gray-500 text-sm">পরিবেশ বাঁচাতে লগইন করুন</p>
            </div>
            
            <div class="space-y-4">
                <input id="auth-email" type="email" placeholder="আপনার ইমেল" class="w-full p-4 bg-gray-50 rounded-2xl outline-none border focus:border-green-500 transition">
                <input id="auth-password" type="password" placeholder="পাসওয়ার্ড" class="w-full p-4 bg-gray-50 rounded-2xl outline-none border focus:border-green-500 transition">
                
                <div class="flex gap-2">
                    <button id="btn-login" class="flex-1 bg-green-600 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-green-700">লগইন</button>
                    <button id="btn-signup" class="flex-1 border-2 border-green-600 text-green-600 py-4 rounded-2xl font-bold hover:bg-green-50">রেজিস্ট্রার</button>
                </div>
            </div>
            <p id="auth-error" class="text-red-500 text-xs hidden">ভুল ইমেল বা পাসওয়ার্ড!</p>
        </div>
    </section>

    <div id="app-content" class="hidden">
        <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md p-4 flex justify-between items-center border-b border-green-100">
            <div class="flex items-center gap-2"><span class="text-2xl">🌱</span><h1 class="font-bold text-green-800 text-xl">সবুজ শিখর</h1></div>
            <div class="flex items-center gap-3">
                <div class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold border border-green-200"><span id="user-xp">0</span> XP</div>
                <img id="top-avatar" src="" class="w-10 h-10 rounded-full border-2 border-white shadow-sm cursor-pointer" onclick="switchTab('profile')">
            </div>
        </header>

        <main class="max-w-md mx-auto p-4">
            <div id="tab-home" class="tab-content active-tab space-y-5">
                <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-white space-y-4">
                    <textarea id="post-desc" class="w-full h-28 p-4 bg-gray-50 rounded-2xl outline-none text-sm resize-none" placeholder="আপনার আজকের ভালো কাজের বর্ণনা দিন (২০+ শব্দ)..."></textarea>
                    <div class="flex items-center justify-between">
                        <label class="cursor-pointer text-green-600 text-sm font-bold flex items-center gap-2 bg-green-50 px-4 py-2 rounded-xl">
                            <i class="fa-solid fa-camera"></i> ছবি দিন
                            <input type="file" id="post-file" class="hidden" accept="image/*">
                        </label>
                        <div id="post-loader" class="loader"></div>
                        <button id="btn-share" class="bg-green-600 text-white px-8 py-2 rounded-xl font-bold shadow-lg">শেয়ার</button>
                    </div>
                </div>
                <div id="feed" class="space-y-5"></div>
            </div>

            <div id="tab-rank" class="tab-content space-y-4">
                <h2 class="text-xl font-bold text-gray-800 text-center">লিডারবোর্ড 🏆</h2>
                <div id="leaderboard" class="bg-white rounded-[2rem] shadow-sm border overflow-hidden"></div>
            </div>

            <div id="tab-profile" class="tab-content space-y-5">
                <div class="bg-white p-8 rounded-[2rem] shadow-sm border text-center space-y-4">
                    <img id="prof-img" src="" class="w-24 h-24 rounded-[2.5rem] mx-auto border-4 border-white shadow-xl">
                    <h3 id="prof-name" class="text-2xl font-bold text-gray-800">লোড হচ্ছে...</h3>
                    <button id="btn-logout" class="text-red-500 font-bold text-sm">লগ আউট</button>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-6 inset-x-6 h-20 bg-white shadow-2xl rounded-[2.5rem] flex justify-around items-center border z-50">
            <button onclick="switchTab('home')" class="nav-link text-green-600 flex flex-col items-center"><i class="fa-solid fa-house"></i><span class="text-[10px] font-bold">হোম</span></button>
            <button onclick="switchTab('rank')" class="nav-link text-gray-400 flex flex-col items-center"><i class="fa-solid fa-trophy"></i><span class="text-[10px] font-bold">র‍্যাঙ্ক</span></button>
            <button onclick="switchTab('profile')" class="nav-link text-gray-400 flex flex-col items-center"><i class="fa-solid fa-user-gear"></i><span class="text-[10px] font-bold">সেটিংস</span></button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, addDoc, onSnapshot, query, orderBy, where, getDocs, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAPFw8UVunLn_ob9zuaY-0unZyiA0bED70",
            authDomain: "sobuj-shikhor-1.firebaseapp.com",
            projectId: "sobuj-shikhor-1",
            storageBucket: "sobuj-shikhor-1.appspot.com",
            messagingSenderId: "582453210412",
            appId: "1:582453210412:web:da5e0188977f8d82ab5089"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore(app);
        const GEMINI_KEY = "AIzaSyB6lRD9MW7p0cruCKW7w1179CblDhpanS4";

        // --- ১. অথেনটিকেশন লজিক ---
        document.getElementById('btn-login').onclick = () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-password').value;
            signInWithEmailAndPassword(auth, email, pass).catch(e => alert("ভুল পাসওয়ার্ড!"));
        };

        document.getElementById('btn-signup').onclick = () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-password').value;
            createUserWithEmailAndPassword(auth, email, pass).then(async (cred) => {
                await setDoc(doc(db, "users", cred.user.uid), { name: email.split('@')[0], xp: 0, bio: "সবুজ যোদ্ধা", photo: "https://cdn-icons-png.flaticon.com/512/149/149071.png" });
            }).catch(e => alert(e.message));
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-content').classList.remove('hidden');
                loadUser(user.uid);
                loadFeed();
                loadRankings();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('app-content').classList.add('hidden');
            }
        });

        document.getElementById('btn-logout').onclick = () => signOut(auth).then(() => location.reload());

        // --- ২. পোস্ট লজিক (AI + GPS + Limit) ---
        document.getElementById('btn-share').onclick = async () => {
            const desc = document.getElementById('post-desc').value;
            const file = document.getElementById('post-file').files[0];
            const btn = document.getElementById('btn-share');
            const loader = document.getElementById('post-loader');

            if (desc.length < 20 || !file) return alert("ছবি ও বর্ণনা দিন!");

            btn.style.display = "none"; loader.style.display = "block";

            // লিমিট চেক
            const dayAgo = new Date(Date.now() - 24*60*60*1000);
            const q = query(collection(db, "posts"), where("uid", "==", auth.currentUser.uid), where("time", ">", dayAgo));
            const snap = await getDocs(q);
            if (snap.size >= 5) { alert("২৪ ঘণ্টায় ৫টি লিমিট শেষ!"); btn.style.display = "block"; loader.style.display = "none"; return; }

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const base64 = e.target.result.split(',')[1];
                    const aiRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                        method: "POST",
                        body: JSON.stringify({ contents: [{ parts: [{ text: "Is this image related to plants or nature cleaning? YES or NO." }, { inline_data: { mime_type: "image/jpeg", data: base64 } }] }] })
                    });
                    const data = await aiRes.json();
                    if (data.candidates[0].content.parts[0].text.includes("NO")) {
                        alert("ভুল ছবি!");
                    } else {
                        await addDoc(collection(db, "posts"), { uid: auth.currentUser.uid, name: document.getElementById('prof-name').innerText, photo: document.getElementById('top-avatar').src, text: desc, image: e.target.result, time: new Date() });
                        await updateDoc(doc(db, "users", auth.currentUser.uid), { xp: increment(50) });
                        alert("সফল! ৫০ XP পেলেন।");
                        location.reload();
                    }
                    btn.style.display = "block"; loader.style.display = "none";
                };
                reader.readAsDataURL(file);
            }, () => { alert("GPS অন করুন!"); btn.style.display = "block"; loader.style.display = "none"; });
        };

        // --- ৩. ডাটা ডিসপ্লে ফাংশন ---
        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active-tab'));
            document.getElementById('tab-' + tab).classList.add('active-tab');
        };

        function loadUser(uid) {
            onSnapshot(doc(db, "users", uid), d => {
                const u = d.data();
                document.getElementById('user-xp').innerText = u.xp;
                document.getElementById('top-avatar').src = u.photo;
                document.getElementById('prof-img').src = u.photo;
                document.getElementById('prof-name').innerText = u.name;
            });
        }

        function loadFeed() {
            onSnapshot(query(collection(db, "posts"), orderBy("time", "desc")), snap => {
                let h = "";
                snap.forEach(d => {
                    const p = d.data();
                    h += `<div class="bg-white p-5 rounded-[2rem] border space-y-3">
                        <div class="flex items-center gap-2"><img src="${p.photo}" class="w-8 h-8 rounded-full border"><b>${p.name}</b></div>
                        <p class="text-sm">${p.text}</p>
                        <img src="${p.image}" class="w-full rounded-2xl h-52 object-cover">
                    </div>`;
                });
                document.getElementById('feed').innerHTML = h;
            });
        }

        function loadRankings() {
            onSnapshot(query(collection(db, "users"), orderBy("xp", "desc")), snap => {
                let h = ""; let i = 1;
                snap.forEach(d => {
                    h += `<div class="flex items-center justify-between p-4 border-b">
                        <div class="flex items-center gap-3"><span>#${i++}</span><img src="${d.data().photo}" class="w-8 h-8 rounded-full"><span>${d.data().name}</span></div>
                        <span class="font-bold text-green-600">${d.data().xp} XP</span>
                    </div>`;
                });
                document.getElementById('leaderboard').innerHTML = h;
            });
        }
    </script>
</body>
</html>
