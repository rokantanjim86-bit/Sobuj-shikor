<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সবুজ শিখর | AI Powered Environmental Platform</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* লগইন এবং প্রোফাইলের জন্য স্টাইল */
        .auth-buttons { display: flex; align-items: center; gap: 10px; }
        #user-profile { display: none; align-items: center; gap: 8px; color: white; background: rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 20px; }
        .user-img { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #4CAF50; }
        #user-name { font-size: 14px; font-weight: bold; }
        .login-btn { cursor: pointer; padding: 8px 15px; background: #2e7d32; color: white; border: none; border-radius: 5px; font-weight: bold; }
        #logout-btn { background: #f44336; font-size: 10px; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <div class="logo">🌱 সবুজ শিখর</div>
        <nav>
            <ul>
                <li><a href="#home">হোম</a></li>
                <li><a href="#activities">কার্যক্রম</a></li>
                <li><a href="#rewards">পুরস্কার</a></li>
                <li><a href="#leaderboard">লিডারবোর্ড</a></li>
            </ul>
        </nav>
        
        <div class="auth-buttons">
            <button id="login-btn" class="login-btn">লগইন</button>
            
            <div id="user-profile">
                <img id="user-photo" class="user-img" src="" alt="User">
                <span id="user-name"></span>
                <button id="logout-btn">আউট</button>
            </div>
        </div>
    </header>

    <section class="hero" id="home">
        <div class="hero-content">
            <h1 class="glow-text">একটি গাছ, একটি পদক্ষেপ,<br>একটি সবুজ ভবিষ্যৎ</h1>
            <p>"সবুজ শিখর" একটি AI Powered Environmental Community Platform যেখানে আপনি পরিবেশ রক্ষা করে অর্জন করবেন Rewards এবং Recognition।</p>
            <div class="hero-btns">
                <button class="primary-btn">যুক্ত হোন</button>
                <button class="secondary-btn">আরো জানুন</button>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // আপনার Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAPFw8UVunLn_ob9zuaY-0unZyiA0bED70",
            authDomain: "sobuj-shikhor-1.firebaseapp.com",
            projectId: "sobuj-shikhor-1",
            storageBucket: "sobuj-shikhor-1.firebasestorage.app",
            messagingSenderId: "582453210412",
            appId: "1:582453210412:web:da5e0188977f8d82ab5089",
            measurementId: "G-DSBFW3DLK1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const provider = new GoogleAuthProvider();

        const loginBtn = document.getElementById('login-btn');
        const userProfile = document.getElementById('user-profile');
        const logoutBtn = document.getElementById('logout-btn');

        // লগইন ফাংশন
        loginBtn.onclick = () => {
            signInWithPopup(auth, provider).catch(err => console.log(err));
        };

        // লগআউট ফাংশন
        logoutBtn.onclick = () => {
            signOut(auth);
        };

        // ইউজার লগইন আছে কি না চেক করা
        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginBtn.style.display = 'none';
                userProfile.style.display = 'flex';
                document.getElementById('user-photo').src = user.photoURL;
                document.getElementById('user-name').innerText = user.displayName.split(' ')[0]; // শুধু প্রথম নাম দেখাবে
            } else {
                loginBtn.style.display = 'block';
                userProfile.style.display = 'none';
            }
        });
    </script>
</body>
</html>
