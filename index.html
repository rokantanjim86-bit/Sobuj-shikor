<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সবুজ শিখর | All-in-One Social</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --app-fs: 16px; --main-bg: #f0f4f3; --card-bg: #ffffff; --text-color: #1f2937; }
        .dark-mode { --main-bg: #111827; --card-bg: #1f2937; --text-color: #f9fafb; }
        
        body { font-family: 'Hind Siliguri', sans-serif; background: var(--main-bg); color: var(--text-color); font-size: var(--app-fs); transition: all 0.3s ease; }
        .tab-content { display: none; }
        .active-tab { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #059669; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .dark-mode .glass-nav { background: rgba(31, 41, 55, 0.8); }
    </style>
</head>
<body class="pb-28">

    <section id="auth-screen" class="fixed inset-0 z-[200] bg-green-50 flex items-center justify-center p-4 overflow-y-auto">
        <div class="bg-white max-w-md w-full p-8 rounded-[2.5rem] shadow-2xl space-y-4 my-8">
            <h1 class="text-3xl font-black text-green-700 text-center">সবুজ শিখর</h1>
            <div id="auth-form" class="space-y-3">
                <input id="reg-name" type="text" placeholder="পুরো নাম" class="w-full p-3 bg-gray-50 border rounded-xl outline-none">
                <input id="reg-work" type="text" placeholder="পেশা (যেমন: ছাত্র)" class="w-full p-3 bg-gray-50 border rounded-xl outline-none">
                <input id="reg-place" type="text" placeholder="বাসস্থান (জেলা)" class="w-full p-3 bg-gray-50 border rounded-xl outline-none">
                <input id="auth-email" type="email" placeholder="ইমেল" class="w-full p-3 bg-gray-50 border rounded-xl outline-none">
                <input id="auth-pass" type="password" placeholder="পাসওয়ার্ড" class="w-full p-3 bg-gray-50 border rounded-xl outline-none">
                
                <div class="flex gap-2 pt-2">
                    <button id="btn-login" class="flex-1 bg-green-100 text-green-700 py-3 rounded-xl font-bold">লগইন</button>
                    <button id="btn-signup" class="flex-1 bg-green-600 text-white py-3 rounded-xl font-bold">রেজিস্ট্রার</button>
                </div>
            </div>
        </div>
    </section>

    <div id="app-content" class="hidden">
        <header class="sticky top-0 z-50 glass-nav p-4 flex justify-between items-center border-b">
            <h1 class="font-bold text-green-600 text-xl">🌱 সবুজ শিখর</h1>
            <div class="flex items-center gap-3">
                <button onclick="toggleDarkMode()" class="text-xl">🌓</button>
                <div class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold"><span id="user-xp">0</span> XP</div>
                <img id="top-avatar" src="" class="w-10 h-10 rounded-full border-2 border-white cursor-pointer" onclick="switchTab('profile')">
            </div>
        </header>

        <main class="max-w-md mx-auto p-4">
            <div id="tab-home" class="tab-content active-tab space-y-4">
                <div class="bg-[var(--card-bg)] p-5 rounded-3xl shadow-sm border space-y-4">
                    <textarea id="post-desc" class="w-full h-24 p-3 bg-gray-50 text-black rounded-2xl outline-none" placeholder="আজকের কাজ শেয়ার করুন..."></textarea>
                    <div class="flex items-center justify-between">
                        <label class="cursor-pointer text-green-600 font-bold flex items-center gap-2">
                            <i class="fa-solid fa-image text-xl"></i>
                            <input type="file" id="post-file" class="hidden" accept="image/*">
                        </label>
                        <div id="post-loader" class="loader"></div>
                        <button id="btn-share" class="bg-green-600 text-white px-6 py-2 rounded-xl font-bold">শেয়ার</button>
                    </div>
                </div>
                <div id="feed" class="space-y-4"></div>
            </div>

            <div id="tab-map" class="tab-content h-[500px] w-full bg-white rounded-3xl border overflow-hidden">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3651.9024424301394!2d90.39017631445453!3d23.750865094675574!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3755b8bd55555555%3A0x1c3f918070949d21!2sDhaka!5e0!3m2!1sen!2sbd!4v1622000000000!5m2!1sen!2sbd" class="w-full h-full border-none"></iframe>
            </div>

            <div id="tab-rank" class="tab-content space-y-4">
                <h2 class="text-center font-bold">সেরা যোদ্ধা 🏆</h2>
                <div id="leaderboard" class="bg-[var(--card-bg)] rounded-3xl border divide-y"></div>
            </div>

            <div id="tab-profile" class="tab-content space-y-4">
                <div class="bg-[var(--card-bg)] p-6 rounded-3xl border text-center space-y-3">
                    <img id="prof-img" src="" class="w-24 h-24 rounded-full mx-auto border-4 border-green-500">
                    <h2 id="prof-name" class="text-xl font-bold">নাম</h2>
                    <p id="prof-info" class="text-sm text-gray-500"></p>
                </div>
                <div class="bg-[var(--card-bg)] p-6 rounded-3xl border space-y-3">
                    <h3 class="font-bold">প্রোফাইল আপডেট</h3>
                    <input id="edit-name" type="text" placeholder="নতুন নাম" class="w-full p-3 bg-gray-50 text-black border rounded-xl">
                    <input id="edit-work" type="text" placeholder="নতুন পেশা" class="w-full p-3 bg-gray-50 text-black border rounded-xl">
                    <button id="btn-update" class="w-full bg-green-700 text-white py-3 rounded-xl font-bold">সেভ করুন</button>
                    
                    <div class="pt-4 border-t space-y-2">
                        <p class="text-xs font-bold text-gray-400">ফন্ট সাইজ</p>
                        <div class="flex gap-2">
                            <button onclick="changeFS('14px')" class="flex-1 bg-gray-100 py-2 rounded-lg text-black text-xs">ছোট</button>
                            <button onclick="changeFS('18px')" class="flex-1 bg-gray-100 py-2 rounded-lg text-black text-xs">বড়</button>
                        </div>
                    </div>
                    <button id="btn-logout" class="w-full text-red-500 font-bold pt-4">লগ আউট</button>
                </div>
            </div>
        </main>

        <button onclick="toggleAI()" class="fixed bottom-32 right-6 w-14 h-14 bg-green-600 text-white rounded-2xl shadow-xl flex items-center justify-center text-2xl z-40">🤖</button>
        <div id="ai-window" class="fixed inset-x-6 bottom-32 h-96 bg-white rounded-3xl shadow-2xl border z-50 hidden flex flex-col overflow-hidden">
            <div class="bg-green-600 p-4 text-white flex justify-between font-bold"><span>এআই অ্যাসিস্ট্যান্ট</span><button onclick="toggleAI()">X</button></div>
            <div id="ai-chat" class="flex-1 p-4 overflow-y-auto space-y-2 text-sm text-black"></div>
            <div class="p-3 border-t flex gap-2">
                <input id="ai-input" type="text" placeholder="জিজ্ঞেস করুন..." class="flex-1 bg-gray-100 p-2 rounded-xl outline-none text-black">
                <button id="ai-send" class="bg-green-600 text-white px-4 rounded-xl">></button>
            </div>
        </div>

        <nav class="fixed bottom-6 inset-x-6 h-20 bg-[var(--card-bg)] shadow-2xl rounded-[2.5rem] border flex justify-around items-center z-50">
            <button onclick="switchTab('home')" class="flex flex-col items-center gap-1 text-green-600"><i class="fa-solid fa-home text-xl"></i><span class="text-[10px]">হোম</span></button>
            <button onclick="switchTab('map')" class="flex flex-col items-center gap-1 text-gray-400"><i class="fa-solid fa-map-location text-xl"></i><span class="text-[10px]">ম্যাপ</span></button>
            <button onclick="switchTab('rank')" class="flex flex-col items-center gap-1 text-gray-400"><i class="fa-solid fa-trophy text-xl"></i><span class="text-[10px]">র‍্যাঙ্ক</span></button>
            <button onclick="switchTab('profile')" class="flex flex-col items-center gap-1 text-gray-400"><i class="fa-solid fa-user-gear text-xl"></i><span class="text-[10px]">সেটিংস</span></button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, addDoc, onSnapshot, query, orderBy, where, getDocs, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAPFw8UVunLn_ob9zuaY-0unZyiA0bED70",
            authDomain: "sobuj-shikhor-1.firebaseapp.com",
            projectId: "sobuj-shikhor-1",
            storageBucket: "sobuj-shikhor-1.appspot.com",
            messagingSenderId: "582453210412",
            appId: "1:582453210412:web:da5e0188977f8d82ab5089"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore(app);
        const GEMINI_KEY = "AIzaSyB6lRD9MW7p0cruCKW7w1179CblDhpanS4";

        // --- ফন্ট ও ডার্ক মুড ---
        window.changeFS = (s) => { document.documentElement.style.setProperty('--app-fs', s); };
        window.toggleDarkMode = () => { document.body.classList.toggle('dark-mode'); };

        // --- অথেনটিকেশন ---
        document.getElementById('btn-signup').onclick = async () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const name = document.getElementById('reg-name').value;
            const work = document.getElementById('reg-work').value;
            const place = document.getElementById('reg-place').value;

            if(!email || !pass || !name) return alert("সব তথ্য দিন!");
            
            createUserWithEmailAndPassword(auth, email, pass).then(async (res) => {
                await setDoc(doc(db, "users", res.user.uid), { 
                    name, work, place, xp: 0, photo: "https://via.placeholder.com/100" 
                });
            }).catch(e => alert(e.message));
        };

        document.getElementById('btn-login').onclick = () => {
            signInWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-pass').value).catch(e => alert("ভুল তথ্য!"));
        };

        onAuthStateChanged(auth, user => {
            if(user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                loadData(user.uid);
                loadFeed();
                loadRankings();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
            }
        });

        // --- পোস্ট শেয়ার (AI + GPS + Limit) ---
        document.getElementById('btn-share').onclick = async () => {
            const desc = document.getElementById('post-desc').value;
            const file = document.getElementById('post-file').files[0];
            const btn = document.getElementById('btn-share');
            const loader = document.getElementById('post-loader');

            if(desc.length < 10 || !file) return alert("ছবি ও সঠিক বর্ণনা দিন!");

            btn.style.display = "none"; loader.style.display = "block";

            // ২৪ ঘণ্টা লিমিট (৫ টি)
            const dayAgo = new Date(Date.now() - 24*60*60*1000);
            const q = query(collection(db, "posts"), where("uid", "==", auth.currentUser.uid), where("time", ">", dayAgo));
            const snap = await getDocs(q);
            if(snap.size >= 5) { alert("আজকের লিমিট শেষ!"); btn.style.display="block"; loader.style.display="none"; return; }

            navigator.geolocation.getCurrentPosition(pos => {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const base64 = e.target.result.split(',')[1];
                    const aiRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                        method: "POST",
                        body: JSON.stringify({ contents: [{ parts: [{ text: "Is this nature/plants? Answer YES or NO." }, { inline_data: { mime_type: "image/jpeg", data: base64 } }] }] })
                    });
                    const data = await aiRes.json();
                    if(data.candidates[0].content.parts[0].text.includes("YES")) {
                        await addDoc(collection(db, "posts"), {
                            uid: auth.currentUser.uid,
                            name: document.getElementById('prof-name').innerText,
                            photo: document.getElementById('top-avatar').src,
                            text: desc, image: e.target.result,
                            likes: [], time: new Date()
                        });
                        await updateDoc(doc(db, "users", auth.currentUser.uid), { xp: increment(50) });
                        alert("সফল! ৫০ XP পেলেন।");
                        location.reload();
                    } else { alert("ভুল ছবি!"); }
                    btn.style.display="block"; loader.style.display="none";
                };
                reader.readAsDataURL(file);
            }, () => { alert("GPS অন করুন!"); btn.style.display="block"; loader.style.display="none"; });
        };

        // --- লাইক ও কমেন্ট ---
        window.likePost = async (id) => {
            const ref = doc(db, "posts", id);
            const s = await getDoc(ref);
            let l = s.data().likes || [];
            if(l.includes(auth.currentUser.uid)) l = l.filter(i => i !== auth.currentUser.uid);
            else l.push(auth.currentUser.uid);
            await updateDoc(ref, { likes: l });
        };

        window.addComment = async (id) => {
            const i = document.getElementById(`in-${id}`);
            if(!i.value) return;
            await addDoc(collection(db, "posts", id, "comments"), { 
                name: document.getElementById('prof-name').innerText, text: i.value, time: new Date() 
            });
            i.value = "";
        };

        // --- ডাটা লোডিং ---
        function loadData(uid) {
            onSnapshot(doc(db, "users", uid), d => {
                const u = d.data();
                document.getElementById('user-xp').innerText = u.xp;
                document.getElementById('top-avatar').src = u.photo;
                document.getElementById('prof-img').src = u.photo;
                document.getElementById('prof-name').innerText = u.name;
                document.getElementById('prof-info').innerText = `${u.work} | ${u.place}`;
            });
        }

        function loadFeed() {
            onSnapshot(query(collection(db, "posts"), orderBy("time", "desc")), snap => {
                let h = "";
                snap.forEach(d => {
                    const p = d.data();
                    h += `<div class="bg-[var(--card-bg)] p-4 rounded-3xl border space-y-3">
                        <div class="flex gap-2 items-center"><img src="${p.photo}" class="w-8 h-8 rounded-full"><b>${p.name}</b></div>
                        <p class="text-sm">${p.text}</p>
                        <img src="${p.image}" class="w-full rounded-2xl h-48 object-cover">
                        <div class="flex gap-4 text-xs font-bold pt-2 border-t">
                            <button onclick="likePost('${d.id}')" class="text-red-500">❤️ ${p.likes.length}</button>
                            <button onclick="document.getElementById('c-${d.id}').classList.toggle('hidden')">💬 কমেন্ট</button>
                        </div>
                        <div id="c-${d.id}" class="hidden space-y-2 pt-2">
                            <div id="list-${d.id}" class="text-[10px] space-y-1"></div>
                            <div class="flex gap-2"><input id="in-${d.id}" class="flex-1 border rounded-lg p-1 text-black text-xs outline-none"><button onclick="addComment('${d.id}')" class="bg-green-600 text-white px-2 rounded-lg">Add</button></div>
                        </div>
                    </div>`;
                    loadComments(d.id);
                });
                document.getElementById('feed').innerHTML = h;
            });
        }

        function loadComments(id) {
            onSnapshot(query(collection(db, "posts", id, "comments"), orderBy("time", "asc")), s => {
                let h = ""; s.forEach(cd => h += `<div><b>${cd.data().name}:</b> ${cd.data().text}</div>`);
                const el = document.getElementById(`list-${id}`); if(el) el.innerHTML = h;
            });
        }

        function loadRankings() {
            onSnapshot(query(collection(db, "users"), orderBy("xp", "desc")), s => {
                let h = ""; s.forEach(d => h += `<div class="p-3 flex justify-between items-center"><span>${d.data().name}</span><b>${d.data().xp} XP</b></div>`);
                document.getElementById('leaderboard').innerHTML = h;
            });
        }

        // --- এডিট প্রোফাইল ---
        document.getElementById('btn-update').onclick = async () => {
            const u = {};
            if(document.getElementById('edit-name').value) u.name = document.getElementById('edit-name').value;
            if(document.getElementById('edit-work').value) u.work = document.getElementById('edit-work').value;
            await updateDoc(doc(db, "users", auth.currentUser.uid), u);
            alert("আপডেট হয়েছে!");
        };

        // --- এআই অ্যাসিস্ট্যান্ট ---
        window.toggleAI = () => document.getElementById('ai-window').classList.toggle('hidden');
        document.getElementById('ai-send').onclick = async () => {
            const inp = document.getElementById('ai-input').value;
            if(!inp) return;
            const chat = document.getElementById('ai-chat');
            chat.innerHTML += `<p class='text-right'><b>আপনি:</b> ${inp}</p>`;
            document.getElementById('ai-input').value = "";
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                method: "POST",
                body: JSON.stringify({ contents: [{ parts: [{ text: inp + ". Answer in Bengali shortly." }] }] })
            });
            const data = await res.json();
            chat.innerHTML += `<p><b>বন্ধু:</b> ${data.candidates[0].content.parts[0].text}</p>`;
        };

        window.switchTab = (t) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active-tab'));
            document.getElementById('tab-' + t).classList.add('active-tab');
        };
        
        document.getElementById('btn-logout').onclick = () => signOut(auth).then(() => location.reload());
    </script>
</body>
                </html>
